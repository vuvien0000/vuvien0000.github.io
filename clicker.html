<!DOCTYPE html>

* {
	font-family: medocita;
	color:white;
}
@font-face {
	font-family: medocita;
	src: url('https://vuvien.nekoweb.org/medocia.otf')
}
.button {
	padding: 20px;
position: absolute;
    top:0;
    bottom: 0;
    left: 0;
    right: 0;
    margin: auto;
	border-radius: 30px;
	max-width: 70%;
	max-height: 90%;
	width: 300px;
	height: 100px;
	border: 3px solid rgba(0,0,0,0.25);
	border-block-end: 10px solid rgba(0,0,0,0.25);
	box-shadow: 0px 5px 20px 10px rgba(0,0,0,0.25),0px 10px 20px 10px rgba(255,255,255,0.5) inset;
transition: 0.075s;
backdrop-filter: blur(20px);
-webkit-backdrop-filter: blur(20px);
}
.button:active {
	border: 0px solid rgba(0,0,0,0);
border-block-end: 0px solid rgba(0,0,0,0);
	transform: translateY(7px);
	box-shadow: 0px 0px 10px 2px rgba(0,0,0,0.1),0px 7px 10px 2px rgba(0,0,0,0.25) inset;
}
.button p {
	font-weight: bold;
	color: white;
	text-shadow: 0px 0px 10px rgba(0,0,0,1);
	font-size: 50px;
	text-align: left;
	pointer-events: none;
}
.box {
position: absolute;
    top:0;
    bottom: 0;
    left: 0;
    right: 0;
    margin: auto;
    max-width: 300px;
    max-height: 600px;
}

a {

	color:inherit;
